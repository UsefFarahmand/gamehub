<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Panda Memory Game</title>

        <link rel="stylesheet" href="style.css">

    </head>


    <body>


        <div id="menu">

            <img src="assets/logo.png">


            <h1>
                🐼 Panda Memory
            </h1>


            <div class="menu-buttons">

                <button id="exitHub">
                    ⬅ Back to Hub
                </button>


                <button id="start">
                    PLAY
                </button>

            </div>


        </div>




        <div class="game hidden">


            <button id="exitGame">
                ⬅ Exit
            </button>


            <h1>
                🐼 Panda Memory
            </h1>


            <div class="info">

                Moves:
                <span id="moves">0</span>

                <br>

                Score:
                <span id="score">0</span>

            </div>


            <div id="board"></div>


        </div>



        <script src="game.js"></script>

    </body>

</html>
